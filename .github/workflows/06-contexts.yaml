name: 06 - Contexts
run-name: 06 - Contexts | DEBUG - ${{ inputs.debug}}    # Custom name for each run
on: 
  push:
  workflow_dispatch:
    inputs:
      debug:
        type: boolean
        default: false

env:
  MY_WORKFLOW_VAR: "workflow"
  MY_OVERWRITTEN_VAR: "workflow"
jobs:
    echo-data:
        runs-on: ubuntu-latest
        env:
          MY_JOB_VAR: "job"
          MY_OVERWRITTEN_VAR: "job"
        steps:
            - name: Display information
              run: |
                echo "Event Name: ${{ github.event_name }}"
                echo "Ref: ${{ github.ref }}"
                echo "SHA: ${{ github.sha}}"
                echo "Actor: ${{ github.actor }}"
                echo "Workflow: ${{ github.workflow }}"
                echo "Run ID: ${{ github.run_id }}"
                echo "Run Number: ${{ github.run_number }}"
            - name: Retrieve variable
              run: |
                echo "Variable Value: ${{ vars.MY_VAR }}"
            - name: Print Env Variables
              env:
                MY_OVERWRITTEN_VAR: "step"      
              run: |
                echo "Workflow env: ${{ env.MY_WORKFLOW_VAR }}"
                echo "Overwritten env: ${{ env.MY_OVERWRITTEN_VAR}}"    # Prints step because env variable in step
            - name: Print Env Variables - Step 2
              run: |
                echo "Workflow env: ${{ env.MY_WORKFLOW_VAR }}"
                echo "Overwritten env: ${{ env.MY_OVERWRITTEN_VAR}}"    # Prints job because env variable in job, not step