name: 03 - Caching
on:
    workflow_dispatch:
        inputs:
            use-cache:
              description: Whether to execute cache step
              type: boolean
              default: true
jobs:
    build:
        runs-on: ubuntu-latest
        # defaults:
        #     run:                  # Set default working directory for all run steps
        #         working-directory: .github/workflows/13-caching
        steps:
            # 1. Check out code
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node
              uses: actions/setup-node@v3
              with:
                node-version: '20.x'
            # 2. Install dependencies
            - name: Install dependencies
              run: npm ci
            # 3. Unit testing, building
            - name: Testing
              run: npm run test
            - name: Building
              run: npm run build
            # 4. Deploy to a nonprod environment
            - name: Deploy to nonprod
              run: echo "Deploying to nonprod"
