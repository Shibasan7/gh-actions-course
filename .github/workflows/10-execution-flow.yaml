name: 10 - Control Execution Flow
on:
    workflow_dispatch:
        inputs:
            pass-unit-tests:
                type: boolean
                description: Whether unit test will pass or not
                default: true
jobs:
    lint-build:
        runs-on: ubunut-latest
        steps:
            - name: Lint and build
              run: echo "Linting and building project"
    unit-test:
        runs-on: ubunut-latest
        continue-on-error: true                 # Workflow exit with successful state even if job fails
        steps:
            - name: Running unit tests
              run: echo "Running tests..."
            - name: Failing tests
              if: ${{ !inputs.pass-unit-tests }}
              run: exit 1
    deploy-nonprod:
        runs-on: ubunut-latest
        needs:
                - lint-build
                - unit-test
        steps:
            - name: Deploying to nonprod
              run: echo "Deploying to nonprod"
    e2e-tests:                                  # End to end test
        runs-on: ubunut-latest
        needs:
            - deploy-nonprod
        steps:
            - name: Running E2E tests
              run: echo "Running E2E tests"
    load-tests:
        runs-on: ubunut-latest
        needs:
            - deploy-nonprod
        steps:
            - name: Running load tests
              run: echo "Running load tests"
    deploy-prod:
        runs-on: ubunut-latest
        needs:
            - e2e-tests
            - load-tests
        steps:
            - name: Deploy to prod
              run: echo "Deploying to prod"