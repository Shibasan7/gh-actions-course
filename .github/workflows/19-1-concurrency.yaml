name: 19 - 1 - Managing Concurrency
on:
  workflow_dispatch:
    inputs:
      ip_address:
        description: 'IP to ping'
        required: true
        default: 8.8.8.8
        type: string
      max_trials:
        description: 'Max number of pings'
        required: true
        default: 20
        type: number
      delay:
        description: 'Delay between pings'
        required: true
        default: 5
        type: number

concurrency:          # Good practice to use different group names for each work flow to avoid possible canceling jobs in other workflows
  group: ${{ github.workflow }}-${{ github.ref }}   # Current workflow and branch names

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Ping URL
        id: ping-url
        run: ping -c ${{ inputs.max_trials}} -i ${{ inputs.delay }} ${{ inputs.ip_address }}