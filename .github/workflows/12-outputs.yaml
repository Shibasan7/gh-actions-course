name: 12 - Working with Outputs
on:
    workflow_dispatch:
        inputs:
            build-status:               # Independent from build-status in outputs; can name it something different
                type: choice
                options:
                        - success
                        - failure
                default: success
jobs:
    build:
        runs-on: ubuntu-latest
        outputs:
            build-status: $${{ steps.build.outputs.status }}        # Independent from build-status in inputs
        steps:
            - name: Print GITHUB_OUTPUT
              run: echo "$GITHUB_OUTPUT"
            - name: Build
              id: build
              run: echo "status=${{ inputs.build-status }}" >> "$GITHUB_OUTPUT"
    deploy:
        runs-on: ubuntu-latest
        needs: build
        if: ${{ needs.build.outputs.build-status == 'success'}}
        steps:
            - name: Deploy
              run: echo "Deploying"