name: 12 - Working with Outputs
on:
    workflow_dispatch:
        inputs:
            build-status:               # Independent from build-status in outputs; can name it something different
                type: choice
                options:
                        - success
                        - failure
                default: success
jobs:
    build:
        runs-on: ubuntu-latest
        outputs:
            build-status: ${{ steps.build.outputs.status }}        # Independent from build-status in inputs
            output1: ${{ steps.build.outputs.output1 }}
        steps:
            - name: Print GITHUB_OUTPUT                             # Steps do not share same GITHUB_OUTPUT file
              run: echo "$GITHUB_OUTPUT"
            - name: Build
              id: build
              run: |
                echo "$GITHUB_OUTPUT"
                echo "status=${{ inputs.build-status }}" >> "$GITHUB_OUTPUT"
                echo "output1=value1" >> "$GITHUB_OUTPUT"
                echo "output2=value2" >> "$GITHUB_OUTPUT"
                cat "$GITHUB_OUTPUT"
                echo "mistake=true" > "$GITHUB_OUTPUT"        # This is a mistake; it will not be used in the workflow
                cat "$GITHUB_OUTPUT"
    deploy:
        runs-on: ubuntu-latest
        needs: build
        if: ${{ needs.build.outputs.build-status == 'success'}}
        steps:
            - name: Deploy
              run: echo "Deploying"
            - name: Print Outputs
              run: |
                echo "Output 1: ${{ needs.build.outputs.output1 }}"