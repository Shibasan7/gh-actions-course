name: 17 - 1 - Custom Actions - Composite
run-name: 17 -1 - Custom Actions - Composite | env - ${{ inputs.target-env }}
on:
    workflow_dispatch:
        inputs:
            target-env:
                description: Which environment to target for dependency installation
                type: choice
                options:
                    - dev
                    - prod
env:
    working-directory: .github/workflows/17-1-custom-actions-composite
jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ${{ env.working-directory}}
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node and NPM Dependencies
              uses: ./.github/workflows/actions/composite-cache-deps
              with:
                node-version: 20.x
                working-dir: ${{ env.working-directory}}        # Still need to define working direcotry for custom action\
                target-dev: ${{ inputs.target-env }}
            - name: Test
              run: npm run test
            - name: Build
              run: npm run build
