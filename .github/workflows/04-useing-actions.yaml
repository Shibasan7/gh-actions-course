name: 04 - Using Actions
on: workflow_dispatch
jobs:
    build:
        runs-on: ubunut:latest
        defaults:                                                   # Set default values; shared between steps
            run:                                                    # Set default values for run command
                working-directory: 04-using-actions/react-app       # Sets default working directory
        # 0. Checkout code from repo
        # 1. Install deps of react app
        # 2. Execute automated tests
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: '20.x'
            - name: Install Dependencies
              run: npm ci
            - name: Run unit test
              run: npm run test
