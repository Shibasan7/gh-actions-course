name: Update NPM Dependencies
description: Checks if there are updates to NPM packages, and creates a PR with the updated package*.json files.

inputs:
    base-branch:
        desecription: The branch used as the base for the dependency update checks
        main: main
        required: false
    target-branch:
        description: The branch to which the PR is created
        default: update-dependencies
        required: false
    working-directory:
        description: The working directory of the project to check for dependency updates
        required: true
    gh-token:
        description: Authentication token with repository access. Must have write access to contents and pull-requests
        required: true
    debug:
        description: Whether to output debug messages to the console
        default: 'false'
runs:
    using: node20           # JS action uses node version
    main: index.js          # JS action entry point